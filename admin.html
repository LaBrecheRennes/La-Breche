<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header text-center">
                        <h2>Admin Panel</h2>
                    </div>
                    <div class="card-body">
                        <div id="admin-message" class="alert d-none"></div>
                        
                        <div class="admin-controls">
                            <h3>Manage Available Spots</h3>
                            <form id="spots-form" class="mb-4">
                                <div class="row align-items-end">
                                    <div class="col-md-6">
                                        <label for="total-spots" class="form-label">Total Available Spots</label>
                                        <input type="number" class="form-control" id="total-spots" min="0" required>
                                    </div>
                                    <div class="col-md-6">
                                        <button type="submit" class="btn btn-primary">Update Spots</button>
                                    </div>
                                </div>
                            </form>
                            
                            <div class="current-stats mb-4">
                                <h5>Current Statistics</h5>
                                <p>Available Spots: <strong id="available-spots">Loading...</strong></p>
                                <p>Registered Users: <strong id="registered-users">Loading...</strong></p>
                            </div>
                        </div>
                        
                        <h3>Registration List</h3>
                        <div class="table-responsive">
                            <table id="registrations-table" class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Surname</th>
                                        <th>Email</th>
                                        <th>Registration Date</th>
                                    </tr>
                                </thead>
                                <tbody id="registrations-list">
                                    <!-- Registration entries will be added here dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <a href="index.html" class="btn btn-secondary">Back to Registration Form</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
